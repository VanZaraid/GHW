<!DOCTYPE html>
<html lang="ru">
<head>
    
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHW</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7f9;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #map-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: grab;
            position: relative;
            background-color: #f4f4f4;
        }

        #map-container.grabbing {
            cursor: grabbing;
        }

        #metro-svg {
            width: 100%;
            height: 100%;
            transform-origin: 0 0; 
            user-select: none;
        }

        .metro-line {
            stroke-width: 11;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke-width 0.2s ease, filter 0.2s ease;
        }

        .station {
            stroke: white;
            transition: r 0.2s ease, stroke-width 0.2s ease;
        }

        .station-group {
            cursor: pointer;
            pointer-events: bounding-box;
        }

        .station-group:hover .station {
            r: 12 !important;
            stroke-width: 4 !important;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.4));
        }

        .station-group:hover text {
            fill: #000;
        }

        .station-label {
            fill: #111;
            font-size: 16px;
            font-weight: 700;
            pointer-events: none;
            transition: fill 0.2s ease;
            text-shadow: 
                2px 2px 0 #f4f4f4, -2px -2px 0 #f4f4f4, 
                2px -2px 0 #f4f4f4, -2px 2px 0 #f4f4f4, 
                0 2px 0 #f4f4f4, 0 -2px 0 #f4f4f4, 
                2px 0 0 #f4f4f4, -2px 0 0 #f4f4f4,
                0 0 4px #f4f4f4; 
        }

        .line-highlight {
            stroke-width: 15;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.3));
        }

        #info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.98);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 280px;
            display: none;
            z-index: 100;
            border: 1px solid #eee;
        }

        #info-panel h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.3em;
            color: #222;
        }

        #info-panel p {
            margin: 0 0 12px 0;
            color: #777;
            font-size: 0.9em;
        }

        .line-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .line-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .line-color-swatch {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.5);
        }

        .line-name {
            font-weight: 600;
            color: #444;
        }

        #close-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            font-size: 1.5em;
            line-height: 1;
            color: #aaa;
        }

        #close-panel:hover { color: #333; }
        
        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 90;
        }
        
        .control-btn {
            width: 44px;
            height: 44px;
            background-color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            background-color: #f8f8f8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div id="controls">
        <button class="control-btn" id="zoom-in">+</button>
        <button class="control-btn" id="zoom-out">−</button>
        <button class="control-btn" id="zoom-reset">⟲</button>
    </div>

    <div id="map-container">
        <svg id="metro-svg" viewBox="0 0 1200 1200">
            <g id="viewport-group">
                <g id="lines-layer"></g>
                <g id="stations-layer"></g>
            </g>
        </svg>
    </div>

    <div id="info-panel">
        <span id="close-panel">&times;</span>
        <h2 id="info-station-name">Название Станции</h2>
        <p>Доступные маршруты:</p>
        <ul class="line-list" id="info-line-list"></ul>
    </div>

    <script>
        // --- БАЗА ДАННЫХ СТАНЦИЙ ПО НОВОЙ ТОПОЛОГИИ ИЗ РИСУНКА ---
        const stationsData = {
            // Синяя ветка
            'almaz_shahta_gs': { name: 'Алмазная шахта ГС', x: 300, y: 150, lines: ['blue'], labelPos: 'top' },
            'downtown_02': { name: 'ДаунТаун 0:2', x: 450, y: 150, lines: ['blue'], labelPos: 'top' },
            'downtown': { name: 'ДаунТаун', x: 550, y: 150, lines: ['blue', 'purple'], labelPos: 'bottom-left' },
            'spavn_ni': { name: 'Площадь Спавна Н.И.', x: 550, y: 300, lines: ['blue'], labelPos: 'left' },
            'sudebnaya': { name: 'Судебная область', x: 650, y: 400, lines: ['blue', 'green'], labelPos: 'bottom' },
            
            // Центральный хаб
            'geocity': { name: 'ГеоСити', x: 900, y: 350, lines: ['blue', 'purple', 'green', 'yellow', 'red'], labelPos: 'top-right' },
            
            // Фиолетовая ветка
            'os3': { name: 'ОС3', x: 430, y: 220, lines: ['purple'], labelPos: 'left' },
            'onostolgii': { name: 'О-в Настольгии', x: 650, y: 200, lines: ['purple'], labelPos: 'right' },
            'kashkin': { name: 'Кашиик', x: 650, y: 270, lines: ['purple'], labelPos: 'bottom' },
            'ind_rayon_gs': { name: 'Индустриальный район ГС', x: 750, y: 220, lines: ['purple', 'pink'], labelPos: 'top' },
            
            // Розовая ветка
            'gold_farm': { name: 'Ферма Золота', x: 600, y: 50, lines: ['pink'], labelPos: 'top' },
            'china_base': { name: 'Китайская база', x: 750, y: 100, lines: ['pink'], labelPos: 'top' },
            
            // Зеленая ветка
            'portal_end': { name: 'Портал в Энд', x: 300, y: 500, lines: ['green'], labelPos: 'left' },
            
            // Бирюзовая ветка
            'chanki': { name: 'Чанки', x: 500, y: 600, lines: ['cyan'], labelPos: 'top' },
            
            // Красная ветка
            'kostovsk': { name: 'Костовск', x: 800, y: 750, lines: ['red'], labelPos: 'right' },
            'ssg': { name: 'ССГ', x: 760, y: 850, lines: ['red'], labelPos: 'right' },
            
            // Желтая ветка
            'arhei': { name: 'Архея', x: 980, y: 530, lines: ['yellow'], labelPos: 'top' },
            'hamistan': { name: 'Хайастан', x: 1100, y: 530, lines: ['yellow'], labelPos: 'top' }
        };

        // --- ГЕОМЕТРИЧЕСКАЯ МАРШРУТИЗАЦИЯ ---
        const linesData = {
            'blue': { 
                color: '#0033A0', name: 'Синяя ветка', // Сделал синий темнее и сочнее
                route: [
                    'almaz_shahta_gs', 'downtown_02', 'downtown', 
                    'spavn_ni', {x: 550, y: 400}, 'sudebnaya', 
                    {x: 710, y: 400}, {x: 760, y: 350}, 'geocity'
                ] 
            },
            'green': { 
                color: '#00A859', name: 'Зеленая ветка',
                // Зеленая идет параллельно синей от Судебной
                route: [
                    'portal_end', {x: 300, y: 400}, 'sudebnaya', 
                    {x: 720, y: 415}, {x: 785, y: 350}, 'geocity'
                ] 
            },
            'purple': { 
                color: '#7A00A0', name: 'Фиолетовая ветка',
                // Та самая сложная петля по рисунку
                route: [
                    'os3', {x: 480, y: 220}, 'downtown', 
                    {x: 600, y: 150}, {x: 650, y: 200}, 'onostolgii', 
                    'kashkin', {x: 700, y: 270}, {x: 750, y: 220}, 'ind_rayon_gs', 
                    {x: 830, y: 220}, {x: 900, y: 290}, 'geocity'
                ] 
            },
            'pink_branch': { 
                color: '#F482B6', name: 'Розовая ветка',
                // Ответвление Китайской базы
                route: ['china_base', {x: 650, y: 150}, {x: 600, y: 150}] 
            },
            'pink': { 
                color: '#F482B6', name: 'Розовая ветка',
                // Основной спуск от Фермы Золота
                route: ['gold_farm', {x: 600, y: 150}, {x: 650, y: 150}, {x: 720, y: 220}, 'ind_rayon_gs'] 
            },
            'red': { 
                color: '#E3000F', name: 'Красная ветка',
                // Спуск от ГеоСити вниз
                route: ['geocity', {x: 900, y: 450}, {x: 800, y: 550}, 'kostovsk', {x: 800, y: 790}, 'ssg'] 
            },
            'cyan': { 
                color: '#00BCE4', name: 'Бирюзовая ветка',
                // Вливается в красную
                route: ['chanki', {x: 800, y: 600}] 
            },
            'yellow': { 
                color: '#FFD100', name: 'Желтая ветка',
                // Спуск и вправо от ГеоСити
                route: ['geocity', {x: 915, y: 365}, {x: 915, y: 530}, 'arhei', 'hamistan'] 
            }
        };

        const linesLayer = document.getElementById('lines-layer');
        const stationsLayer = document.getElementById('stations-layer');
        const infoPanel = document.getElementById('info-panel');

        function generateRoundedPath(routeArray, radius = 40) {
            const pts = routeArray.map(item => typeof item === 'string' ? stationsData[item] : item);
            if (pts.length < 2) return '';
            if (pts.length === 2) return `M ${pts[0].x} ${pts[0].y} L ${pts[1].x} ${pts[1].y}`;

            let d = `M ${pts[0].x} ${pts[0].y} `;
            for (let i = 1; i < pts.length - 1; i++) {
                const p0 = pts[i - 1], p1 = pts[i], p2 = pts[i + 1];
                const d0x = p0.x - p1.x, d0y = p0.y - p1.y;
                const len0 = Math.sqrt(d0x * d0x + d0y * d0y);
                const d2x = p2.x - p1.x, d2y = p2.y - p1.y;
                const len2 = Math.sqrt(d2x * d2x + d2y * d2y);

                if (len0 === 0 || len2 === 0) continue;
                const r = Math.min(radius, len0 / 2.1, len2 / 2.1);

                const qStartX = p1.x + (d0x / len0) * r;
                const qStartY = p1.y + (d0y / len0) * r;
                const qEndX = p1.x + (d2x / len2) * r;
                const qEndY = p1.y + (d2y / len2) * r;

                d += `L ${qStartX} ${qStartY} Q ${p1.x} ${p1.y} ${qEndX} ${qEndY} `;
            }
            d += `L ${pts[pts.length - 1].x} ${pts[pts.length - 1].y}`;
            return d;
        }

        // Отрисовка линий
        Object.keys(linesData).forEach(lineId => {
            const line = linesData[lineId];
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            // Если это ветвь розовой, привязываем классы для подсветки ко всей ветке
            const logicalLineId = lineId.startsWith('pink') ? 'pink' : lineId;
            path.setAttribute('id', `line-${lineId}`);
            path.setAttribute('class', `metro-line logic-line-${logicalLineId}`);
            path.setAttribute('stroke', line.color);
            path.setAttribute('d', generateRoundedPath(line.route));
            linesLayer.appendChild(path);
        });

        // Вспомогательная функция для точек соединения
        function drawConnectionPoint(x, y, color) {
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', x);
            circle.setAttribute('cy', y);
            circle.setAttribute('r', 5.5);
            circle.setAttribute('fill', color);
            linesLayer.appendChild(circle);
        }
        
        // Рисуем точку слияния бирюзовой и красной ветки
        drawConnectionPoint(800, 600, '#00BCE4');
        // Рисуем развилку розовой ветки
        drawConnectionPoint(650, 150, '#F482B6');

        // Отрисовка станций
        Object.keys(stationsData).forEach(stationId => {
            const station = stationsData[stationId];
            const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            group.setAttribute('class', 'station-group');
            group.setAttribute('data-id', stationId);

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('class', 'station');
            circle.setAttribute('cx', station.x);
            circle.setAttribute('cy', station.y);
            
            if (station.lines.length > 1) {
                circle.setAttribute('r', 11);
                circle.setAttribute('fill', 'white');
                circle.setAttribute('stroke', '#222');
                circle.setAttribute('stroke-width', 3);
            } else {
                circle.setAttribute('r', 8);
                // Берем основной цвет линии
                const mainLine = station.lines[0];
                circle.setAttribute('fill', linesData[mainLine].color);
                circle.setAttribute('stroke-width', 2);
            }

            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('class', 'station-label');
            text.textContent = station.name;

            // Гибкое позиционирование текста
            let dx = 18, dy = 6, anchor = 'start';
            if (station.labelPos === 'bottom') { dx = 0; dy = 28; anchor = 'middle'; }
            else if (station.labelPos === 'top') { dx = 0; dy = -18; anchor = 'middle'; }
            else if (station.labelPos === 'left') { dx = -18; dy = 6; anchor = 'end'; }
            else if (station.labelPos === 'right') { dx = 18; dy = 6; anchor = 'start'; }
            else if (station.labelPos === 'top-right') { dx = 15; dy = -15; anchor = 'start'; }
            else if (station.labelPos === 'bottom-left') { dx = -15; dy = 25; anchor = 'end'; }

            text.setAttribute('x', station.x + dx);
            text.setAttribute('y', station.y + dy);
            text.setAttribute('text-anchor', anchor);

            group.appendChild(circle);
            group.appendChild(text);
            stationsLayer.appendChild(group);

            group.addEventListener('mouseenter', e => {
                stationsData[e.currentTarget.getAttribute('data-id')].lines.forEach(lineId => {
                    document.querySelectorAll(`.logic-line-${lineId}`).forEach(el => el.classList.add('line-highlight'));
                });
            });
            group.addEventListener('mouseleave', () => {
                document.querySelectorAll('.line-highlight').forEach(el => el.classList.remove('line-highlight'));
            });
            group.addEventListener('click', handleStationClick);
        });

        // Логика попапа
        function handleStationClick(e) {
            e.stopPropagation();
            const stationId = e.currentTarget.getAttribute('data-id');
            const station = stationsData[stationId];

            document.getElementById('info-station-name').textContent = station.name;
            const lineListItems = document.getElementById('info-line-list');
            lineListItems.innerHTML = ''; 

            station.lines.forEach(lineId => {
                const line = linesData[lineId];
                const li = document.createElement('li');
                li.setAttribute('class', 'line-item');
                li.innerHTML = `<div class="line-color-swatch" style="background-color: ${line.color}"></div>
                                <span class="line-name">${line.name}</span>`;
                lineListItems.appendChild(li);
            });
            infoPanel.style.display = 'block';
        }

        document.getElementById('close-panel').addEventListener('click', () => infoPanel.style.display = 'none');

        // Скролл и Зум
        const svg = document.getElementById('metro-svg');
        const container = document.getElementById('map-container');
        let viewBox = { x: 0, y: 0, w: 1200, h: 1200 };
        let isPanning = false, startPoint = { x: 0, y: 0 }, scale = 1;

        function updateViewBox() { svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`); }

        container.addEventListener('mousedown', e => {
            if (!e.target.closest('.station-group')) {
                isPanning = true; container.classList.add('grabbing');
                startPoint = { x: e.clientX, y: e.clientY };
                infoPanel.style.display = 'none';
            }
        });

        window.addEventListener('mousemove', e => {
            if (!isPanning) return;
            const dx = (e.clientX - startPoint.x) * (viewBox.w / container.clientWidth);
            const dy = (e.clientY - startPoint.y) * (viewBox.h / container.clientHeight);
            viewBox.x -= dx; viewBox.y -= dy;
            updateViewBox();
            startPoint = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mouseup', () => { isPanning = false; container.classList.remove('grabbing'); });

        container.addEventListener('wheel', e => {
            e.preventDefault();
            const newScale = Math.max(0.3, Math.min(3, scale - e.deltaY * 0.001));
            if (newScale === scale) return;

            const rect = container.getBoundingClientRect();
            const mouseXSVG = viewBox.x + (e.clientX - rect.left) * (viewBox.w / container.clientWidth);
            const mouseYSVG = viewBox.y + (e.clientY - rect.top) * (viewBox.h / container.clientHeight);

            const zoomFactor = scale / newScale;
            viewBox.w *= zoomFactor; viewBox.h *= zoomFactor;
            viewBox.x = mouseXSVG - (e.clientX - rect.left) * (viewBox.w / container.clientWidth);
            viewBox.y = mouseYSVG - (e.clientY - rect.top) * (viewBox.h / container.clientHeight);
            scale = newScale; updateViewBox();
        }, { passive: false });

        function zoomCentered(factor) {
            const newScale = Math.max(0.3, Math.min(3, scale * factor));
            const actualFactor = scale / newScale;
            const centerX = viewBox.x + viewBox.w / 2, centerY = viewBox.y + viewBox.h / 2;
            viewBox.w *= actualFactor; viewBox.h *= actualFactor;
            viewBox.x = centerX - viewBox.w / 2; viewBox.y = centerY - viewBox.h / 2;
            scale = newScale; updateViewBox();
        }
        document.getElementById('zoom-in').addEventListener('click', () => zoomCentered(1.3));
        document.getElementById('zoom-out').addEventListener('click', () => zoomCentered(0.7));
        document.getElementById('zoom-reset').addEventListener('click', () => {
            viewBox = { x: 0, y: 0, w: 1200, h: 1200 }; scale = 1; updateViewBox(); infoPanel.style.display = 'none';
        });
    </script>
</body>
</html>
